<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900">
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 24px; font-weight: bold; }
    .subtitle { font-size: 18px; font-weight: bold; }
    .content { font-size: 14px; }
  </style>
  
  <rect width="100%" height="100%" fill="#e6f3f3"/>
  
  <text x="200" y="40" class="title" text-anchor="middle" fill="#2c5e5e">耳鸣诊断思维链</text>
  
  <g transform="translate(20, 80)">
    <rect width="360" height="100" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">症状评估</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 性质: 持续性/间歇性、单侧/双侧</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 特征: 声音类型、响度、频率</text>
  </g>
  
  <g transform="translate(20, 200)">
    <rect width="360" height="120" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">可能原因</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 听力损伤: 噪音暴露、老年性听力损失</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 耳部疾病: 耳垢堵塞、中耳炎</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 全身性疾病: 高血压、颈椎病</text>
  </g>
  
  <g transform="translate(20, 340)">
    <rect width="360" height="140" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">诊断步骤</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">1. 详细询问病史和耳鸣特征</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">2. 耳鼻喉检查和听力测试</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">3. 必要时进行影像学检查 (如MRI)</text>
    <text x="10" y="120" class="content" fill="#2c5e5e">4. 评估对日常生活的影响程度</text>
  </g>
  
  <g transform="translate(20, 500)">
    <rect width="360" height="140" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">治疗方法</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 原发疾病治疗: 如清理耳垢、治疗中耳炎</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 声音治疗: 掩蔽疗法、习惯化训练</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 药物治疗: 抗焦虑药、抗抑郁药</text>
    <text x="10" y="120" class="content" fill="#2c5e5e">• 行为治疗: 认知行为疗法、放松训练</text>
  </g>
  
  <g transform="translate(20, 660)">
    <rect width="360" height="100" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">关键信息</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 耳鸣常为症状而非疾病本身</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 治疗需针对原因和症状并重</text>
  </g>
  
  <text x="200" y="880" class="content" text-anchor="middle" fill="#2c5e5e">注意：此图仅供参考，具体诊断请咨询医生</text>
</svg>
