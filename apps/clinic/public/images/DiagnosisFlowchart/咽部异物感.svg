<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900">
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 24px; font-weight: bold; }
    .subtitle { font-size: 18px; font-weight: bold; }
    .content { font-size: 14px; }
  </style>
  
  <rect width="100%" height="100%" fill="#e6f3f3"/>
  
  <text x="200" y="40" class="title" text-anchor="middle" fill="#2c5e5e">咽部异物感诊断思维链</text>
  
  <g transform="translate(20, 80)">
    <rect width="360" height="120" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">症状评估</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 持续时间: 急性 vs 慢性</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 性质: 异物感、梗塞感、刺痛感</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 伴随症状: 吞咽困难、声音嘶哑等</text>
  </g>
  
  <g transform="translate(20, 220)">
    <rect width="360" height="140" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">可能原因</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 咽喉炎症或感染</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 胃食管反流病 (GERD)</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 咽喉肌肉痉挛或紧张</text>
    <text x="10" y="120" class="content" fill="#2c5e5e">• 心理因素 (如焦虑、抑郁)</text>
  </g>
  
  <g transform="translate(20, 380)">
    <rect width="360" height="140" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">诊断步骤</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">1. 详细病史询问</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">2. 咽喉检查 (包括内镜检查)</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">3. 必要时进行辅助检查 (如吞咽造影)</text>
    <text x="10" y="120" class="content" fill="#2c5e5e">4. 排除严重疾病 (如咽喉肿瘤)</text>
  </g>
  
  <g transform="translate(20, 540)">
    <rect width="360" height="140" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">治疗方法</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 对症治疗: 局部麻醉喷剂、润喉药</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 针对性治疗: 如抗反流药、抗焦虑药</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 生活方式调整: 如饮食习惯、减压</text>
    <text x="10" y="120" class="content" fill="#2c5e5e">• 心理咨询 (如有必要)</text>
  </g>
  
  <g transform="translate(20, 700)">
    <rect width="360" height="120" rx="10" fill="#a0d6d6" opacity="0.6"/>
    <text x="10" y="30" class="subtitle" fill="#2c5e5e">关键信息</text>
    <text x="10" y="60" class="content" fill="#2c5e5e">• 持续症状(&gt;2周)需就医</text>
    <text x="10" y="80" class="content" fill="#2c5e5e">• 排除器质性病变很重要</text>
    <text x="10" y="100" class="content" fill="#2c5e5e">• 心理因素不容忽视</text>
  </g>
  
  <text x="200" y="880" class="content" text-anchor="middle" fill="#2c5e5e">注意：此图仅供参考，具体诊断请咨询医生</text>
</svg>
