<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 | TCCC战术战伤救护流程</title>
    
    <!-- PWA相关元标签 -->
    <meta name="description" content="基于CoTCCC 2017版官方指南的交互式战术战伤救护决策流程">
    <meta name="theme-color" content="#EE1C25">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCCC流程">
    
    <!-- PWA图标 -->
    <link rel="icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- 样式表 -->
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    <link rel="stylesheet" href="/assets/css/fontawesome-shim.css">
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .offline-container {
            max-width: 500px;
            padding: 2rem;
        }
        
        .icon {
            font-size: 5rem;
            color: #EE1C25;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 2rem;
        }
        
        .highlight {
            color: #EE1C25;
        }
        
        .btn {
            background-color: #2a2a2a;
            border: 1px solid #444444;
            color: #FFFFFF;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        
        .btn:hover {
            background-color: #EE1C25;
            border-color: #FF3C44;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1L23 23" stroke="#EE1C25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20.5 16.7C21.1 15.5 21.5 14.3 21.5 13C21.5 10.8 20.4 8.7 18.4 7.1C16.4 5.5 13.7 4.5 10.9 4.5C10.2 4.5 9.5 4.6 8.8 4.7" stroke="#EE1C25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16.3 12.8C16.7 12.4 17 11.7 17 11C17 9.3 15.7 8 14 8C13.3 8 12.6 8.3 12.2 8.7" stroke="#EE1C25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 16.5H14.01" stroke="#EE1C25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5.3 7.8C3.9 9.1 3 10.9 3 13C3 17.4 7 21 12 21C14.1 21 16 20.1 17.3 18.7" stroke="#EE1C25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>您当前处于<span class="highlight">离线</span>模式</h1>
        <p>网络连接不可用，但您仍可以访问之前浏览过的页面和功能。请连接到网络以获取最完整的体验。</p>
        <button class="btn" onclick="window.location.href='./'">返回首页</button>
    </div>
    
    <script>
        // 检查网络连接状态
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
