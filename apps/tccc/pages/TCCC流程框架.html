<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCCC流程框架 | 可复用决策流程</title>
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    <link rel="stylesheet" href="/assets/css/fontawesome-shim.css">
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overscroll-behavior: none;
        }

        .bento-grid-container {
            display: grid;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 900px;
            margin: auto;
        }

        .bento-box {
            background-color: #1a1a1a;
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid #333333;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2), 0 20px 40px -20px rgba(255, 107, 0, 0.3);
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
        }
        
        .bento-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.25), 0 25px 50px -20px rgba(255, 107, 0, 0.4);
        }
        
        .highlight-redEE1C25 { color: #EE1C25; }
        .highlight-redEE1C25-bg { background-color: #EE1C25; }
        .highlight-redEE1C25-border { border-color: #EE1C25; }

        .chinese-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
        }
        
        .english-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #a0a0a0;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .action-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
        }
        
        .detail-text {
            font-size: clamp(0.875rem, 2.5vw, 1.1rem);
            color: #cccccc;
        }

        .step-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            scroll-snap-align: start;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .decision-button {
            background-color: #2a2a2a;
            border: 1px solid #444444;
            color: #FFFFFF;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            margin: 0.5rem;
            min-width: 180px;
            text-align: center;
        }
        
        .decision-button:hover {
            background-color: #EE1C25;
            border-color: #FF3C44;
            color: #000000;
            transform: translateY(-3px);
        }
        
        .decision-button .eng {
            font-size: 0.8em;
            opacity: 0.7;
            display: block;
            margin-top: 0.15rem;
        }

        .info-box {
            background-color: #252525;
            border-left: 4px solid #EE1C25;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            border-radius: 0.25rem 0.5rem 0.5rem 0.25rem;
        }
        
        .info-box .info-title {
            font-weight: bold;
            color: #EE1C25;
        }
        
        .icon-style {
            font-size: clamp(3rem, 8vw, 6rem);
            color: #EE1C25;
            opacity: 0.3;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 0;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        /* 能力级别标记样式 */
        .capability-green {
            color: #4ADE80;
            border: 1px solid #4ADE80;
            background-color: rgba(74, 222, 128, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
            font-size: 0.85rem;
            display: inline-block;
        }
        
        .capability-yellow {
            color: #FACC15;
            border: 1px solid #FACC15;
            background-color: rgba(250, 204, 21, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
            font-size: 0.85rem;
            display: inline-block;
        }
        
        .capability-red {
            color: #F87171;
            border: 1px solid #F87171;
            background-color: rgba(248, 113, 113, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
            font-size: 0.85rem;
            display: inline-block;
        }

        .capability-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="tcccMasterContainer">
        <!-- 内容将通过JavaScript动态加载 -->
    </div>

    <script>
        /**
         * TCCC Flow Framework - 可复用的决策流程框架
         * 可以适配不同内容，方便维护和扩展
         */
        
        // 全局配置
        const CONFIG = {
            title: "TCCC流程框架",
            subtitle: "可复用决策流程",
            themeColor: "#EE1C25",
            animations: true,
            language: "zh-CN"
        };
        
        // 用户决策记录
        let decisions = {};
        
        /**
         * 步骤数据结构示例:
         * {
         *    id: "step-0",                      // 步骤唯一标识
         *    title: "步骤标题",                  // 步骤主标题（中文）
         *    subtitle: "Step Title",           // 步骤副标题（英文）
         *    type: "intro|info|decision",      // 步骤类型：介绍、信息展示或决策
         *    icon: "fa-icon-name",             // 图标类名（FontAwesome）
         *    iconColor: "#color",              // 图标颜色（可选）
         *    highlight: true|false,            // 是否高亮标题
         *    
         *    // 信息类型的步骤属性
         *    infoBoxes: [{                     // 信息框数组
         *        title: "信息标题",
         *        subtitle: "信息副标题",
         *        detail: "详细信息",
         *        isList: true|false,           // 是否为列表
         *        items: ["列表项1", "列表项2"]   // 列表项（isList为true时使用）
         *    }],
         *    
         *    // 决策类型的步骤属性
         *    options: [{                       // 决策选项数组
         *        text: "选项文本",
         *        textEng: "Option Text",
         *        key: "decisionKey",           // 决策记录的键名
         *        value: true|false|"value",    // 决策值
         *        nextStep: "step-id"           // 选择此选项后跳转的步骤ID
         *    }],
         *    
         *    // 通用属性
         *    actionText: "按钮文本",            // 下一步按钮文本
         *    actionTextEng: "Button Text",     // 下一步按钮英文文本
         *    nextStep: "step-id",              // 下一步步骤ID
         *    hasRestart: true|false,           // 是否为重新开始按钮
         *    
         *    // 新增人员能力级别属性
         *    capabilityLevel: "green|yellow|red", // 能力级别（绿色、黄色或红色）
         *    capabilityTooltip: "能力说明文本"    // 能力级别提示文本（可选）
         * }
         */
        
        // 演示用的步骤数据
        const demoSteps = [
            {
                id: "step-0",
                title: "决策流程框架",
                subtitle: "Interactive Decision Framework",
                secondaryTitle: "可复用流程引擎",
                secondarySubtitle: "Reusable Process Engine",
                detail: "适用于各种交互式决策流程 | For various interactive decision flows",
                actionText: "开始演示",
                actionTextEng: "Start Demo",
                nextStep: "step-1",
                icon: "fa-code",
                highlight: true,
                type: "intro"
            },
            {
                id: "step-1",
                title: "示例决策",
                subtitle: "Example Decision",
                options: [
                    {
                        text: "选项一",
                        textEng: "Option One",
                        key: "demo",
                        value: 1,
                        nextStep: "step-2a"
                    },
                    {
                        text: "选项二",
                        textEng: "Option Two",
                        key: "demo",
                        value: 2,
                        nextStep: "step-2b"
                    }
                ],
                icon: "fa-question-circle",
                type: "decision"
            },
            {
                id: "step-2a",
                title: "选择了选项一",
                subtitle: "Option One Selected",
                infoBoxes: [
                    {
                        title: "您的选择: <span class='highlight-redEE1C25'>选项一</span>",
                        detail: "这是一个演示信息框，展示如何使用此框架创建信息展示"
                    }
                ],
                actionText: "返回开始",
                actionTextEng: "Back to Start",
                nextStep: "step-0",
                icon: "fa-check-circle",
                hasRestart: true,
                type: "info"
            },
            {
                id: "step-2b",
                title: "选择了选项二",
                subtitle: "Option Two Selected",
                infoBoxes: [
                    {
                        title: "您的选择: <span class='highlight-redEE1C25'>选项二</span>",
                        detail: "这是另一个演示信息框，展示具有不同内容的相同结构"
                    }
                ],
                actionText: "返回开始",
                actionTextEng: "Back to Start",
                nextStep: "step-0",
                icon: "fa-check-circle",
                hasRestart: true,
                type: "info"
            }
        ];
        
        /**
         * 初始化流程框架
         * @param {Array} steps - 步骤数据数组
         */
        function initFlowFramework(steps = demoSteps) {
            // 生成所有步骤的HTML
            generateAllSteps(steps);
            
            // 初始化动画
            if (CONFIG.animations) {
                initIntersectionObserver();
            } else {
                document.querySelectorAll('.step-section').forEach(section => {
                    section.style.opacity = '1';
                    section.style.transform = 'translateY(0)';
                });
            }
            
            // 显示第一个步骤
            setTimeout(() => {
                const firstSection = document.getElementById(steps[0].id);
                if (firstSection) {
                    firstSection.style.opacity = '1';
                    firstSection.style.transform = 'translateY(0)';
                }
            }, 100);
        }
        
        /**
         * 生成所有步骤的HTML
         * @param {Array} steps - 步骤数据数组
         */
        function generateAllSteps(steps) {
            const container = document.getElementById('tcccMasterContainer');
            if (!container) return;
            
            let html = '';
            
            steps.forEach(step => {
                html += generateStepHTML(step);
            });
            
            container.innerHTML = html;
        }
        
        /**
         * 生成单个步骤的HTML
         * @param {Object} step - 步骤数据
         * @returns {string} - 生成的HTML字符串
         */
        function generateStepHTML(step) {
            let html = `
                <section id="${step.id}" class="step-section">
                    <div class="bento-grid-container w-full">
                        <div class="bento-box col-span-1 md:col-span-2 text-center relative overflow-hidden">
                            <i class="fas ${step.icon} icon-style"${step.iconColor ? ` style="color: ${step.iconColor}; opacity:0.2;"` : ''}></i>
            `;
            
            // 添加能力标记（如果有）
            if (step.capabilityLevel) {
                const capabilityClass = `capability-${step.capabilityLevel}`;
                const tooltipText = step.capabilityTooltip || getDefaultCapabilityTooltip(step.capabilityLevel);
                html += `<div class="capability-badge"><span class="${capabilityClass}" title="${tooltipText}">
                    <i class="fas fa-user-md mr-1"></i>${getCapabilityLevelText(step.capabilityLevel)}</span></div>`;
            }
            
            html += `<div class="content-wrapper">
            `;
            
            // 根据步骤类型生成不同的内容
            if (step.type === 'intro') {
                html += `
                    <h1 class="chinese-title${step.highlight ? ' highlight-redEE1C25' : ''}">${step.title}</h1>
                    <p class="english-subtitle">${step.subtitle}</p>
                    <div class="mt-4">
                        <p class="chinese-title text-3xl font-semibold">${step.secondaryTitle}</p>
                        <p class="english-subtitle text-lg">${step.secondarySubtitle}</p>
                    </div>
                    <p class="detail-text mt-8 mb-4">${step.detail}</p>
                    <button onclick="scrollToStep('${step.nextStep}')" class="decision-button highlight-redEE1C25-bg text-black font-bold">
                        ${step.actionText} <span class="eng">${step.actionTextEng}</span>
                    </button>
                `;
            } else if (step.type === 'decision') {
                html += `
                    <h2 class="chinese-title">${step.title}</h2>
                    <p class="english-subtitle">${step.subtitle}</p>
                    <div class="mt-12 flex flex-col md:flex-row justify-center items-center">
                `;
                
                // 生成选项按钮
                step.options.forEach(option => {
                    html += `
                        <button onclick="decideAndScroll('${option.key}', ${typeof option.value === 'string' ? `'${option.value}'` : option.value}, '${option.nextStep}')" class="decision-button">
                            ${option.text} <span class="eng">${option.textEng}</span>
                        </button>
                    `;
                });
                
                html += `</div>`;
            } else if (step.type === 'info') {
                // 生成标题
                html += `
                    <h2 class="chinese-title${step.highlight ? ' highlight-redEE1C25' : ''}">${step.title}</h2>
                    <p class="english-subtitle">${step.subtitle}</p>
                `;
                
                // 可选的行动标签
                if (step.actionLabel) {
                    html += `
                        <div class="my-8">
                            <p class="action-text text-redEE1C25-500">${step.actionLabel}</p>
                            <p class="english-subtitle text-gray-400">${step.actionLabelEng}</p>
                        </div>
                    `;
                }
                
                // 生成信息框
                if (step.infoBoxes && step.infoBoxes.length > 0) {
                    step.infoBoxes.forEach((box, index) => {
                        html += `<div class="info-box text-left${index === 0 ? ' my-8' : index > 0 ? ' mt-6' : ''}">`;
                        
                        if (box.title) {
                            html += `<p class="${box.isList ? 'info-title text-xl mb-2' : 'action-text text-2xl'}">${box.title}</p>`;
                        }
                        
                        if (box.subtitle) {
                            html += `<p class="detail-text mt-1">${box.subtitle}</p>`;
                        }
                        
                        if (box.detail) {
                            html += `<p class="detail-text${box.subtitle ? ' mt-2' : ' mt-1'}">${box.detail}</p>`;
                        }
                        
                        // 生成列表项
                        if (box.isList && box.items && box.items.length > 0) {
                            html += `<ul class="list-disc list-inside detail-text space-y-1">`;
                            box.items.forEach(item => {
                                html += `<li>${item}</li>`;
                            });
                            html += `</ul>`;
                        }
                        
                        html += `</div>`;
                    });
                }
                
                // 可选的行动详情
                if (step.actionDetail) {
                    html += `
                        <p class="action-text my-6">${step.actionDetail}</p>
                        <p class="english-subtitle">${step.actionDetailEng}</p>
                    `;
                }
                
                // 下一步按钮
                const iconClass = step.hasRestart ? 'fa-redo' : 'fa-arrow-down';
                html += `
                    <button onclick="scrollToStep('${step.nextStep}')" class="decision-button mt-8">
                        ${step.actionText} <span class="eng">${step.actionTextEng}</span> <i class="fas ${iconClass} ml-2"></i>
                    </button>
                `;
            }
            
            html += `
                            </div>
                        </div>
                    </div>
                </section>
            `;
            
            return html;
        }
        
        /**
         * 初始化intersection observer以实现滚动动画
         */
        function initIntersectionObserver() {
            const sections = document.querySelectorAll('.step-section');
            
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.3
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);
            
            sections.forEach(section => {
                observer.observe(section);
            });
        }
        
        /**
         * 滚动到指定步骤
         * @param {string} stepId - 步骤ID
         */
        function scrollToStep(stepId) {
            const element = document.getElementById(stepId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        /**
         * 记录决策并滚动
         * @param {string} key - 决策键名
         * @param {any} value - 决策值
         * @param {string} stepId - 下一步ID
         */
        function decideAndScroll(key, value, stepId) {
            // 记录决策
            if (!decisions) decisions = {};
            decisions[key] = value;
            console.log("Decisions:", decisions);
            
            // 执行自定义决策处理函数（如果存在）
            if (typeof onDecisionMade === 'function') {
                onDecisionMade(key, value, decisions);
            }
            
            // 滚动到下一步
            setTimeout(() => {
                scrollToStep(stepId);
            }, 100);
        }
        
        /**
         * 导出决策记录
         * @returns {Object} - 决策记录对象
         */
        function exportDecisions() {
            return JSON.parse(JSON.stringify(decisions));
        }
        
        /**
         * 导入决策记录
         * @param {Object} importedDecisions - 要导入的决策记录
         */
        function importDecisions(importedDecisions) {
            decisions = JSON.parse(JSON.stringify(importedDecisions));
        }
        
        /**
         * 重置决策记录
         */
        function resetDecisions() {
            decisions = {};
        }
        
        /**
         * 加载新的流程步骤
         * @param {Array} steps - 新的步骤数据
         */
        function loadFlow(steps) {
            // 重置决策
            resetDecisions();
            // 初始化新流程
            initFlowFramework(steps);
        }
        
        /**
         * 自定义决策回调函数（可由用户覆盖）
         * @param {string} key - 决策键名
         * @param {any} value - 决策值
         * @param {Object} allDecisions - 所有决策记录
         */
        function onDecisionMade(key, value, allDecisions) {
            // 默认实现
            console.log(`决策已记录: ${key} = ${value}`);
            // 用户可以覆盖此函数以添加自定义逻辑
        }
        
        /**
         * 获取能力级别默认显示文本
         * @param {string} level - 能力级别（green、yellow或red）
         * @returns {string} - 能力级别显示文本
         */
        function getCapabilityLevelText(level) {
            switch(level) {
                case 'green':
                    return '全员';
                case 'yellow':
                    return '医护';
                case 'red':
                    return '专业';
                default:
                    return '';
            }
        }
        
        /**
         * 获取能力级别默认提示文本
         * @param {string} level - 能力级别（green、yellow或red）
         * @returns {string} - 能力级别提示文本
         */
        function getDefaultCapabilityTooltip(level) {
            switch(level) {
                case 'green':
                    return '所有作战人员和战斗生命救护员能力等级';
                case 'yellow':
                    return '战斗医护人员能力等级';
                case 'red':
                    return '战斗医疗队或特种作战医护人员能力等级';
                default:
                    return '';
            }
        }
        
        // 公开API
        window.TCCCFlow = {
            init: initFlowFramework,
            loadFlow: loadFlow,
            scrollToStep: scrollToStep,
            decideAndScroll: decideAndScroll,
            exportDecisions: exportDecisions,
            importDecisions: importDecisions,
            resetDecisions: resetDecisions,
            generateStepHTML: generateStepHTML
        };
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => initFlowFramework());
    </script>
</body>
</html>
