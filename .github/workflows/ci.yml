name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-react-versions:
    name: Check React versions consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check React versions
        id: check-react
        run: |
          echo "### React versions across apps" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm list --depth 0 --recursive 2>/dev/null | grep "react@" | sed 's/^/          /' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          VERSIONS=$(pnpm list --depth 0 --recursive 2>/dev/null | grep -oP 'react@\K[0-9]+\.[0-9]+\.[0-9]+' | sort -u | wc -l)
          if [ "$VERSIONS" -gt 1 ]; then
            echo "❌ React version mismatch detected!"
            echo "Run \`pnpm up react@^18.3.0 react-dom@^18.3.0 -r\` to unify."
            exit 1
          fi
          echo "✅ All apps use the same React version"

  active-platform:
    name: Build active Cloudflare platform
    runs-on: ubuntu-latest
    needs: check-react-versions
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Cloudflare contract tests
        run: pnpm test:cloudflare

      - name: Build Cloudflare Pages output
        run: pnpm build:cloudflare

      - name: Size budget
        run: pnpm size:budget

      - name: Audit built links
        run: |
          pnpm exec wrangler pages dev .cloudflare/site --compatibility-date=2026-06-16 --port=8788 --install-skills=false > /tmp/hongyishi-wrangler.log 2>&1 &
          WRANGLER_PID=$!
          trap 'kill $WRANGLER_PID' EXIT
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8788/ >/dev/null; then
              break
            fi
            sleep 1
          done
          pnpm audit:links -- --base=http://127.0.0.1:8788
