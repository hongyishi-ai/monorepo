name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-react-versions:
    name: Check React versions consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check React versions
        id: check-react
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const projects = JSON.parse(
            execFileSync('pnpm', ['list', '--depth', '0', '--recursive', '--json'], {
              encoding: 'utf8',
            }),
          );
          const rows = [];
          const reactVersions = new Set();
          const reactDomVersions = new Set();

          for (const project of projects) {
            const dependencies = {
              ...(project.dependencies ?? {}),
              ...(project.devDependencies ?? {}),
            };

            for (const packageName of ['react', 'react-dom']) {
              const dependency = dependencies[packageName];
              if (!dependency?.version) continue;

              rows.push(`${project.name ?? project.path}: ${packageName}@${dependency.version}`);
              if (packageName === 'react') reactVersions.add(dependency.version);
              if (packageName === 'react-dom') reactDomVersions.add(dependency.version);
            }
          }

          const report = ['### React versions across workspaces', '', '```', ...rows, '```', ''].join('\n');
          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, report);
          }
          console.log(report);

          if (reactVersions.size > 1 || reactDomVersions.size > 1) {
            console.error('React version mismatch detected.');
            process.exit(1);
          }

          console.log('All direct React dependencies use one version.');
          NODE

  active-platform:
    name: Build active Cloudflare platform
    runs-on: ubuntu-latest
    needs: check-react-versions
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Cloudflare contract tests
        run: pnpm test:cloudflare

      - name: Build Cloudflare Pages output
        run: pnpm build:cloudflare

      - name: Size budget
        run: pnpm size:budget

      - name: Audit built links
        run: |
          pnpm exec wrangler pages dev .cloudflare/site --compatibility-date=2026-06-16 --port=8788 --install-skills=false > /tmp/hongyishi-wrangler.log 2>&1 &
          WRANGLER_PID=$!
          trap 'kill $WRANGLER_PID' EXIT
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8788/ >/dev/null; then
              break
            fi
            sleep 1
          done
          pnpm audit:links -- --base=http://127.0.0.1:8788
